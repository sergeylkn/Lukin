name: Build Android APK

on:
  push:
    branches: [ "claude/youtube-video-translator-LvU39", "main" ]
  workflow_dispatch:   # кнопка "Run workflow" на GitHub

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Android APK (release)
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleRelease \
            -Pandroid.signingStoreFile=app/debug.keystore \
            -Pandroid.signingStorePassword=android \
            -Pandroid.signingKeyAlias=androiddebugkey \
            -Pandroid.signingKeyPassword=android \
            --no-daemon

      - name: Find APK
        id: find_apk
        run: |
          APK=$(find android/app/build/outputs/apk -name "*.apk" | head -1)
          echo "apk_path=$APK" >> $GITHUB_OUTPUT
          echo "Found: $APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-ru-translator
          path: ${{ steps.find_apk.outputs.apk_path }}
          retention-days: 30

      - name: Create Release (only on main)
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "YouTube RU Translator v${{ github.run_number }}"
          files: ${{ steps.find_apk.outputs.apk_path }}
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
