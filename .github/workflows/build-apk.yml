name: Build Android APK

on:
  push:
    branches: [ "claude/youtube-video-translator-LvU39", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # GitHub ubuntu-latest has Android SDK at $ANDROID_SDK_ROOT
      # We need to install the exact NDK version React Native requires
      - name: Install NDK and build tools
        run: |
          # Find sdkmanager — it may be in any cmdline-tools version folder
          SDKMANAGER=$(find "$ANDROID_SDK_ROOT/cmdline-tools" -name "sdkmanager" -type f 2>/dev/null | head -1)
          if [ -z "$SDKMANAGER" ]; then
            echo "sdkmanager not found, trying PATH"
            SDKMANAGER=$(which sdkmanager)
          fi
          echo "Using sdkmanager: $SDKMANAGER"
          echo "y" | "$SDKMANAGER" \
            "platforms;android-35" \
            "build-tools;35.0.0" \
            "ndk;26.1.10909125"

      - name: Write local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties
          echo "ndk.dir=$ANDROID_SDK_ROOT/ndk/26.1.10909125" >> android/local.properties
          cat android/local.properties

      - name: Install JS dependencies
        run: npm install --legacy-peer-deps

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: youtube-ru-translator
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30
